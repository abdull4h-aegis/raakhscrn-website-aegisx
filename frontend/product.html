<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product — RAAKHSCRN</title>
  <meta name="description" content="Shop RAAKHSCRN — screen-printed tote bags, hand-crafted in Islamabad, Pakistan.">
  <link rel="stylesheet" href="styles.css">
  <style>
    .product-page {
      padding-top: 80px;
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* --- LEFT: IMAGE GALLERY --- */
    .gallery-col {
      position: sticky;
      top: 80px;
      height: calc(100vh - 80px);
      display: flex;
      flex-direction: column;
      gap: 0;
      background: #0d0d0d;
      overflow: hidden;
    }

    .gallery-main {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px;
    }

    .gallery-main img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      transition: opacity 0.4s ease;
    }

    .gallery-main .no-img {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 80px;
      color: #1a1a1a;
      letter-spacing: 4px;
    }

    .gallery-thumbs {
      display: flex;
      gap: 2px;
      padding: 2px;
      background: var(--black);
      overflow-x: auto;
      max-height: 90px;
      flex-shrink: 0;
    }

    .gallery-thumbs::-webkit-scrollbar {
      height: 3px;
    }

    .gallery-thumbs::-webkit-scrollbar-thumb {
      background: #333;
    }

    .gallery-thumb {
      width: 60px;
      min-width: 60px;
      height: 80px;
      object-fit: cover;
      cursor: pointer;
      opacity: 0.5;
      border: 2px solid transparent;
      transition: opacity 0.2s, border-color 0.2s;
      flex-shrink: 0;
    }

    .gallery-thumb.active {
      opacity: 1;
      border-color: var(--accent);
    }

    /* --- RIGHT: PRODUCT INFO --- */
    .info-col {
      padding: 60px 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      background: var(--black);
      border-left: 1px solid #1a1a1a;
      overflow-y: auto;
    }

    .product-breadcrumb {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 24px;
    }

    .product-breadcrumb a {
      color: var(--mid);
      text-decoration: none;
      transition: color 0.2s;
    }

    .product-breadcrumb a:hover {
      color: var(--accent);
    }

    .product-page-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 5vw, 64px);
      letter-spacing: 2px;
      line-height: 1;
      color: var(--white);
      margin-bottom: 8px;
    }

    .product-page-meta {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 24px;
    }

    .product-page-price {
      font-family: 'Courier Prime', monospace;
      font-size: 28px;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 32px;
    }

    .product-page-desc {
      font-size: 12px;
      line-height: 2;
      color: #888;
      letter-spacing: 0.5px;
      margin-bottom: 40px;
      border-top: 1px solid #1a1a1a;
      padding-top: 24px;
    }

    .selector-group {
      margin-bottom: 28px;
    }

    .selector-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }

    .selector-options {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .selector-option {
      padding: 8px 16px;
      border: 1px solid #333;
      background: transparent;
      color: var(--white);
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .selector-option:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .selector-option.active {
      background: var(--accent);
      color: var(--black);
      border-color: var(--accent);
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 0;
      margin-bottom: 32px;
    }

    .qty-btn-lg {
      width: 44px;
      height: 44px;
      background: #111;
      border: 1px solid #333;
      color: var(--white);
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .qty-btn-lg:hover {
      background: #222;
    }

    .qty-display {
      width: 60px;
      height: 44px;
      background: #0a0a0a;
      border: 1px solid #333;
      border-left: none;
      border-right: none;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier Prime', monospace;
      font-size: 18px;
      color: var(--white);
    }

    .add-to-cart-lg {
      width: 100%;
      padding: 18px;
      background: var(--white);
      color: var(--black);
      border: none;
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 16px;
    }

    .add-to-cart-lg:hover {
      background: var(--accent);
    }

    .added-flash {
      background: var(--accent) !important;
      color: var(--black) !important;
    }

    .product-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid #1a1a1a;
    }

    .product-tag {
      font-size: 8px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #444;
      border: 1px solid #1a1a1a;
      padding: 4px 10px;
    }

    .loading-placeholder {
      padding: 60px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px;
      color: #333;
      letter-spacing: 4px;
    }

    @media (max-width: 768px) {
      .product-page {
        grid-template-columns: 1fr;
      }

      .gallery-col {
        position: relative;
        height: auto;
        aspect-ratio: 3/4;
        min-height: 400px;
        top: 0;
      }

      .info-col {
        padding: 40px 24px;
      }
    }
  </style>
</head>

<body>
  <div class="noise"></div>

  <nav>
    <a href="index.html" class="nav-logo">RAAKHSCRN</a>
    <div class="nav-toggle" id="mobile-menu">
      <span></span>
      <span></span>
      <span></span>
    </div>
    <ul class="nav-links" id="nav-menu">
      <li><a href="shop.html">Shop</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="process.html">Process</a></li>
      <li><a href="contact.html">Contact</a></li>
      <li><a href="#" id="cart-icon" style="color: var(--accent); font-weight: bold;">Cart (0)</a></li>
    </ul>
  </nav>

  <div class="product-page" id="product-page">
    <!-- Gallery Column -->
    <div class="gallery-col" id="gallery-col">
      <div class="gallery-main" id="gallery-main">
        <div class="no-img">RAAKH</div>
      </div>
      <div class="gallery-thumbs" id="gallery-thumbs"></div>
    </div>

    <!-- Info Column -->
    <div class="info-col" id="info-col">
      <div class="loading-placeholder">Loading product...</div>
    </div>
  </div>

  <footer>
    <div class="footer-logo">RAAKHSCRN</div>
    <div class="footer-links">
      <a href="shop.html">Shop</a>
      <a href="about.html">About</a>
      <a href="process.html">Process</a>
      <a href="contact.html">Contact</a>
    </div>
  </footer>
  <div class="footer-bottom">
    <span class="footer-copy">© 2025 Raakhscrn. All rights reserved.</span>
    <span class="footer-copy">Islamabad, Pakistan — Developed by <a href="https://aegisxtechnologies.site"
        target="_blank" style="color: inherit; text-decoration: underline;">AegisX Technologies</a></span>
  </div>

  <script>
    const API_URL = 'https://raakhscrn-shop.up.railway.app';

    // Get product ID from URL: product.html?id=xxx
    const params = new URLSearchParams(window.location.search);
    const productId = params.get('id');

    let currentProduct = null;
    let selectedSize = null;
    let selectedColor = null;
    let quantity = 1;

    async function loadProduct() {
      if (!productId) {
        document.getElementById('info-col').innerHTML = `
        <div class="loading-placeholder" style="font-size:14px; color:#555; font-family:'Space Mono',monospace;">
          No product selected.<br><br>
          <a href="shop.html" style="color:var(--accent); text-decoration:none; letter-spacing:2px;">← Back to Shop</a>
        </div>`;
        return;
      }

      try {
        const res = await fetch(`${API_URL}/api/products`);
        const data = await res.json();

        if (data.success) {
          currentProduct = data.products.find(p => p._id === productId);
        }

        if (!currentProduct) {
          document.getElementById('info-col').innerHTML = `
          <div class="loading-placeholder" style="font-size:14px; color:#555; font-family:'Space Mono',monospace;">
            Product not found.<br><br>
            <a href="shop.html" style="color:var(--accent); text-decoration:none; letter-spacing:2px;">← Back to Shop</a>
          </div>`;
          return;
        }

        document.title = `${currentProduct.name} — RAAKHSCRN`;

        // Support both old schema (image string) and new schema (images array)
        const imagesArr = (currentProduct.images && currentProduct.images.length > 0)
          ? currentProduct.images
          : (currentProduct.image ? [currentProduct.image] : []);

        renderGallery(imagesArr);
        renderInfo(currentProduct);

      } catch (err) {
        console.error(err);
        document.getElementById('info-col').innerHTML = `
        <div class="loading-placeholder" style="font-size:12px; color:#555; font-family:'Space Mono',monospace;">
          Error loading product.<br>Make sure your backend is running at ${API_URL}.
        </div>`;
      }
    }

    function renderGallery(images) {
      const main = document.getElementById('gallery-main');
      const thumbsEl = document.getElementById('gallery-thumbs');

      if (!images || images.length === 0) return;

      // Main image
      main.innerHTML = `<img id="main-img" src="${API_URL}${images[0]}" alt="Product Image">`;

      // Thumbnails
      if (images.length > 1) {
        thumbsEl.innerHTML = images.map((img, i) => `
        <img src="${API_URL}${img}" class="gallery-thumb ${i === 0 ? 'active' : ''}"
          onclick="setMainImage(this, '${API_URL}${img}')" alt="View ${i + 1}">
      `).join('');
      } else {
        thumbsEl.style.display = 'none';
      }
    }

    function setMainImage(thumbEl, src) {
      document.getElementById('main-img').src = src;
      document.querySelectorAll('.gallery-thumb').forEach(t => t.classList.remove('active'));
      thumbEl.classList.add('active');
    }

    function renderInfo(p) {
      const infoCol = document.getElementById('info-col');

      const sizesHTML = p.sizes && p.sizes.length > 0 ? `
      <div class="selector-group">
        <div class="selector-label">Size</div>
        <div class="selector-options" id="size-options">
          ${p.sizes.map(s => `<button class="selector-option" onclick="selectSize(this, '${s}')">${s}</button>`).join('')}
        </div>
      </div>
    ` : '';

      const colorsHTML = p.colors && p.colors.length > 0 ? `
      <div class="selector-group">
        <div class="selector-label">Color</div>
        <div class="selector-options" id="color-options">
          ${p.colors.map(c => `<button class="selector-option" onclick="selectColor(this, '${c}')">${c}</button>`).join('')}
        </div>
      </div>
    ` : '';

      infoCol.innerHTML = `
      <div class="product-breadcrumb">
        <a href="shop.html">Shop</a> / ${p.name}
      </div>

      <h1 class="product-page-name">${p.name}</h1>
      <div class="product-page-meta">${p.description}</div>
      <div class="product-page-price">PKR ${p.price.toLocaleString()}</div>

      <div class="product-page-desc">${p.description}</div>

      ${sizesHTML}
      ${colorsHTML}

      <div class="selector-group">
        <div class="selector-label">Quantity</div>
        <div class="qty-control">
          <button class="qty-btn-lg" onclick="changeQty(-1)">−</button>
          <div class="qty-display" id="qty-display">1</div>
          <button class="qty-btn-lg" onclick="changeQty(1)">+</button>
        </div>
      </div>

      <button class="add-to-cart-lg" id="atc-btn" onclick="addToCart()">Add to Cart</button>

      <div class="product-tags">
        <span class="product-tag">Screen Printed</span>
        <span class="product-tag">Hand Crafted</span>
        <span class="product-tag">Islamabad, Pakistan</span>
        <span class="product-tag">Limited Drop</span>
      </div>
    `;
    }

    function selectSize(el, size) {
      document.querySelectorAll('#size-options .selector-option').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
      selectedSize = size;
    }

    function selectColor(el, color) {
      document.querySelectorAll('#color-options .selector-option').forEach(btn => btn.classList.remove('active'));
      el.classList.add('active');
      selectedColor = color;
    }

    function changeQty(delta) {
      quantity = Math.max(1, quantity + delta);
      document.getElementById('qty-display').textContent = quantity;
    }

    function addToCart() {
      if (!currentProduct) return;

      // Check if size required but not selected
      if (currentProduct.sizes && currentProduct.sizes.length > 0 && !selectedSize) {
        alert('Please select a size.');
        return;
      }

      // Check if color required but not selected
      if (currentProduct.colors && currentProduct.colors.length > 0 && !selectedColor) {
        alert('Please select a color.');
        return;
      }

      // Build item name with options
      let itemName = currentProduct.name;
      const opts = [];
      if (selectedSize) opts.push(selectedSize);
      if (selectedColor) opts.push(selectedColor);
      if (opts.length > 0) itemName += ` (${opts.join(' / ')})`;

      // Get cart from localStorage
      const cart = JSON.parse(localStorage.getItem('raakh_cart')) || [];

      const existingItem = cart.find(item => item.id === currentProduct._id + (selectedSize || '') + (selectedColor || ''));
      if (existingItem) {
        existingItem.quantity += quantity;
      } else {
        cart.push({
          id: currentProduct._id + (selectedSize || '') + (selectedColor || ''),
          name: itemName,
          price: currentProduct.price,
          quantity: quantity
        });
      }

      localStorage.setItem('raakh_cart', JSON.stringify(cart));

      // Flash the button
      const btn = document.getElementById('atc-btn');
      btn.textContent = '✓ Added to Cart!';
      btn.classList.add('added-flash');
      setTimeout(() => {
        btn.textContent = 'Add to Cart';
        btn.classList.remove('added-flash');
      }, 1500);

      // Update cart icon count (managed by script.js via storage event or inline)
      updateCartIconCount(cart);
    }

    function updateCartIconCount(cart) {
      const totalQty = cart.reduce((sum, item) => sum + item.quantity, 0);
      const cartIcon = document.getElementById('cart-icon');
      if (cartIcon) cartIcon.textContent = `Cart (${totalQty})`;
    }

    // Init
    loadProduct();
  </script>

  <!-- Load shared cart/checkout script -->
  <script src="script.js"></script>
</body>

</html>
